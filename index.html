<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rich Off Futures – Gen 1 Boot Camp</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR EXISTING CSS — unchanged for brevity */
/* (your styles are fine, no need to rewrite them) */
</style>
</head>

<body>

<!-- ================= SIGNUP ================= -->
<div id="view-signup" class="view active">
  <h1>Rich Off Futures</h1>

  <div>
    <div>Seats Left: <span id="seats-display">10</span></div>
    <div id="slots-visual"></div>
  </div>

  <input id="f-name" placeholder="Name">
  <input id="f-phone" placeholder="Phone">
  <input id="f-email" placeholder="Email">
  <input id="f-ig" placeholder="Instagram">

  <button onclick="submitSignup()">Reserve My Seat</button>
</div>

<!-- ================= SUCCESS ================= -->
<div id="view-success" class="view">
  <h2>You're In</h2>
  <p>Send payment via CashApp: <span id="cashapp-display"></span></p>
</div>

<!-- ================= WAITLIST ================= -->
<div id="view-waitlist" class="view">
  <h2>Waitlist</h2>

  <input id="wl-name" placeholder="Name">
  <input id="wl-email" placeholder="Email">
  <input id="wl-ig" placeholder="Instagram">

  <button onclick="submitWaitlist()">Join Waitlist</button>
</div>

<!-- ================= ADMIN LOGIN ================= -->
<div id="view-admin-login" class="view">
  <input id="admin-pass" type="password" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
  <p id="admin-err" style="display:none;color:red;">Wrong password</p>
</div>

<!-- ================= ADMIN DASH ================= -->
<div id="view-admin-dash" class="view">
  <h2>Admin Dashboard</h2>

  <div>
    Signed: <span id="stat-signed">0</span> |
    Paid: <span id="stat-paid">0</span> |
    Remaining: <span id="stat-remaining">10</span>
  </div>

  <table border="1">
    <thead>
      <tr>
        <th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>IG</th><th>Status</th>
      </tr>
    </thead>
    <tbody id="roster-body"></tbody>
  </table>
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://qpfobewbtynzonsnswhr.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const ADMIN_PASSWORD = "richoff2025";
const CASHAPP_TAG = "$RichOffFutures";
const MAX_SEATS = 10;

/* ================= INIT SUPABASE ================= */
const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ================= NAV ================= */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= GET SIGNUPS ================= */
async function getSignups() {
  const { data, error } = await supabase
    .from('signups')
    .select('*')
    .order('seat_number', { ascending: true });

  if (error) {
    console.error("GET ERROR:", error.message);
    return [];
  }

  return data || [];
}

/* ================= UPDATE SEATS ================= */
async function updateSeatsDisplay() {
  const signups = await getSignups();

  const remaining = Math.max(0, MAX_SEATS - signups.length);
  document.getElementById("seats-display").textContent = remaining;

  const slots = document.getElementById("slots-visual");
  slots.innerHTML = "";

  for (let i = 0; i < MAX_SEATS; i++) {
    const div = document.createElement("div");
    div.style.width = "20px";
    div.style.height = "10px";
    div.style.margin = "2px";
    div.style.display = "inline-block";
    div.style.background = i < signups.length ? "#555" : "#222";
    slots.appendChild(div);
  }

  if (remaining === 0) showView("view-waitlist");
}

/* ================= SIGNUP ================= */
async function submitSignup() {

  const name = document.getElementById("f-name").value.trim();
  const phone = document.getElementById("f-phone").value.trim();
  const email = document.getElementById("f-email").value.trim();
  const ig = document.getElementById("f-ig").value.trim();

  if (!name || !phone || !email || !ig) {
    alert("Fill all fields");
    return;
  }

  const signups = await getSignups();

  if (signups.length >= MAX_SEATS) {
    showView("view-waitlist");
    return;
  }

  const seat_number = signups.length + 1;

  const { error } = await supabase
    .from("signups")
    .insert([{
      seat_number,
      name,
      phone,
      email,
      instagram: ig.startsWith("@") ? ig : "@" + ig,
      paid: false
    }]);

  if (error) {
    console.error("INSERT ERROR:", error.message);
    alert(error.message);
    return;
  }

  document.getElementById("cashapp-display").textContent = CASHAPP_TAG;

  showView("view-success");
  updateSeatsDisplay();
}

/* ================= WAITLIST ================= */
async function submitWaitlist() {

  const name = document.getElementById("wl-name").value.trim();
  const email = document.getElementById("wl-email").value.trim();
  const ig = document.getElementById("wl-ig").value.trim();

  if (!name || !email) {
    alert("Fill required fields");
    return;
  }

  const { error } = await supabase
    .from("waitlist")
    .insert([{ name, email, instagram: ig }]);

  if (error) {
    console.error(error.message);
    alert(error.message);
    return;
  }

  alert("You're on the waitlist 🔥");
}

/* ================= ADMIN ================= */
function adminLogin() {
  const pass = document.getElementById("admin-pass").value;

  if (pass !== ADMIN_PASSWORD) {
    document.getElementById("admin-err").style.display = "block";
    return;
  }

  document.getElementById("admin-err").style.display = "none";
  renderDash();
  showView("view-admin-dash");
}

/* ================= DASHBOARD ================= */
async function renderDash() {

  const signups = await getSignups();
  const paid = signups.filter(s => s.paid).length;

  document.getElementById("stat-signed").textContent = signups.length;
  document.getElementById("stat-paid").textContent = paid;
  document.getElementById("stat-remaining").textContent = MAX_SEATS - signups.length;

  const tbody = document.getElementById("roster-body");
  tbody.innerHTML = "";

  signups.forEach(s => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${s.seat_number}</td>
      <td>${s.name}</td>
      <td>${s.phone}</td>
      <td>${s.email}</td>
      <td>${s.instagram}</td>
      <td>
        <button onclick="togglePaid(${s.id}, ${s.paid})">
          ${s.paid ? "PAID" : "UNPAID"}
        </button>
      </td>
    `;

    tbody.appendChild(row);
  });
}

/* ================= TOGGLE PAID ================= */
async function togglePaid(id, paid) {

  const { error } = await supabase
    .from("signups")
    .update({ paid: !paid })
    .eq("id", id);

  if (error) {
    console.error(error.message);
    return;
  }

  renderDash();
}

/* ================= BOOT ================= */
window.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("cashapp-display").textContent = CASHAPP_TAG;
  await updateSeatsDisplay();
});
</script>

</body>
</html>
