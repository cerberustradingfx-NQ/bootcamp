<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Off Futures – Gen 1 Boot Camp</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* (UNCHANGED STYLES — keeping yours exactly as-is) */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0A0F1E; --gold:#D4A017; --gold2:#F0C040;
  --cyan:#00D4FF; --white:#F0EEE8; --dim:#7A8290;
  --red:#FF4444; --green:#00C878;
}
body { background: var(--navy); color: var(--white); font-family: 'Barlow', sans-serif; }
.view { display:none; }
.view.active { display:block; }
/* keep rest of your CSS exactly the same (not changed to avoid breaking layout) */
</style>
</head>

<body>

<!-- ================= SIGNUP VIEW ================= -->
<div id="view-signup" class="view active">
  <h1 style="padding:30px;text-align:center;">Rich Off Futures</h1>

  <div style="padding:20px; max-width:500px; margin:auto;">
    <input id="f-name" placeholder="Name"><br><br>
    <input id="f-phone" placeholder="Phone"><br><br>
    <input id="f-email" placeholder="Email"><br><br>
    <input id="f-ig" placeholder="Instagram"><br><br>

    <button onclick="submitSignup()">Submit</button>
  </div>

  <button onclick="showView('view-admin-login')">Admin</button>
</div>

<!-- ================= SUCCESS ================= -->
<div id="view-success" class="view">
  <h2 style="text-align:center;padding:50px;">You're In 🔐</h2>
</div>

<!-- ================= WAITLIST ================= -->
<div id="view-waitlist" class="view">
  <h2 style="text-align:center;padding:50px;">Waitlist</h2>
</div>

<!-- ================= ADMIN LOGIN ================= -->
<div id="view-admin-login" class="view">
  <div style="padding:40px;text-align:center;">
    <input id="admin-pass" type="password" placeholder="Admin password">
    <button onclick="adminLogin()">Login</button>
  </div>
</div>

<!-- ================= ADMIN DASH ================= -->
<div id="view-admin-dash" class="view">
  <h2 style="padding:20px;">Admin Dashboard</h2>
  <div id="admin-list"></div>
</div>

<script>
/* ================= CONFIG ================= */
const ADMIN_PASSWORD = "richoff2025";
const MAX_SEATS = 10;

const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ================= VIEW SWITCH ================= */
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= SIGNUP ================= */
async function submitSignup(){

  const name = document.getElementById("f-name").value;
  const phone = document.getElementById("f-phone").value;
  const email = document.getElementById("f-email").value;
  const ig = document.getElementById("f-ig").value;

  if(!name || !phone || !email || !ig) return;

  const { count } = await supabase
    .from("signups")
    .select("*",{count:"exact", head:true});

  if((count||0) >= MAX_SEATS){
    showView("view-waitlist");
    return;
  }

  const { error } = await supabase
    .from("signups")
    .insert({
      seat_number: (count||0)+1,
      name,
      phone,
      email,
      instagram: ig,
      paid:false
    });

  if(error){
    alert("Error saving signup");
    console.log(error);
    return;
  }

  showView("view-success");
}

/* ================= ADMIN ================= */
async function adminLogin(){

  const pass = document.getElementById("admin-pass").value;

  if(pass !== ADMIN_PASSWORD){
    alert("Wrong password");
    return;
  }

  const { data } = await supabase
    .from("signups")
    .select("*")
    .order("seat_number");

  let html = "<ul>";

  data.forEach(s=>{
    html += `<li>
      #${s.seat_number} ${s.name} | ${s.email} | ${s.instagram}
      (${s.paid ? "Paid" : "Unpaid"})
    </li>`;
  });

  html += "</ul>";

  document.getElementById("admin-list").innerHTML = html;

  showView("view-admin-dash");
}
</script>

</body>
</html>
