<body>

<script>
/* ── SUPABASE INIT (FIXED) ── */
const SUPABASE_URL = 'https://qpfobewbtynzonsnswhr.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZm9iZXdidHluem9uc25zd2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODExODUsImV4cCI6MjA5Njk1NzE4NX0.0a9IsIgyYnXkOGuMxXoavBWu5FML4zmvzJCIGC8iwBQ';

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ── CONFIG ── */
const ADMIN_PASSWORD = 'richoff2025';
const CASHAPP_TAG = '$richoffnqtrading';
const MAX_SEATS = 10;

/* ── FIXED: Storage helpers ── */
async function getSignups() {
  const { data, error } = await supabase
    .from('signups')
    .select('*')
    .order('seat_number');

  if (error) {
    console.error(error);
    return [];
  }

  return data || [];
}

async function getWaitlist() {
  const { data, error } = await supabase
    .from('waitlist')
    .select('*')
    .order('created_at');

  if (error) {
    console.error(error);
    return [];
  }

  return data || [];
}

/* ── VIEW SWITCH ── */
function showView(id) {
  document.querySelectorAll('.view')
    .forEach(v => v.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ── FIXED: Seats display (ASYNC FIX) ── */
async function updateSeatsDisplay() {
  const signups = await getSignups(); // ✅ FIXED (was missing await)

  const remaining = Math.max(0, MAX_SEATS - signups.length);

  const seatsEl = document.getElementById('seats-display');
  if (seatsEl) seatsEl.textContent = remaining;

  const sv = document.getElementById('slots-visual');
  if (sv) {
    sv.innerHTML = '';
    for (let i = 0; i < MAX_SEATS; i++) {
      const d = document.createElement('div');
      d.className = 'sv ' + (i < signups.length ? 'filled' : 'open');
      sv.appendChild(d);
    }
  }

  if (remaining === 0) showView('view-waitlist');
}

/* ── CASHAPP INIT ── */
function initCashApp() {
  ['cashapp-display', 'cashapp-remind-display'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = CASHAPP_TAG;
  });
}

/* ── SIGNUP ── */
async function submitSignup() {

  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const ig = document.getElementById('f-ig').value.trim();

  if (!name || !phone || !email || !ig) {
    alert('Please complete all fields');
    return;
  }

  const signups = await getSignups();

  if (signups.length >= MAX_SEATS) {
    showView('view-waitlist');
    return;
  }

  const seatNumber = signups.length + 1;

  const { error } = await supabase.from('signups').insert([
    {
      seat_number: seatNumber,
      name,
      phone,
      email,
      instagram: ig.startsWith('@') ? ig : '@' + ig,
      paid: false
    }
  ]);

  if (error) {
    console.error(error);
    alert('Signup failed');
    return;
  }

  showView('view-success');
  updateSeatsDisplay();
}

/* ── WAITLIST ── */
async function submitWaitlist() {

  const name = document.getElementById('wl-name').value.trim();
  const email = document.getElementById('wl-email').value.trim();
  const instagram = document.getElementById('wl-ig').value.trim();

  if (!name || !email) {
    alert('Complete all required fields');
    return;
  }

  const { error } = await supabase.from('waitlist').insert([
    { name, email, instagram }
  ]);

  if (error) {
    console.error(error);
    alert('Failed to join waitlist');
    return;
  }

  document.querySelector('.waitlist-form').innerHTML =
    `<div style="padding:20px;color:var(--gold2)">You're on the list 🔥</div>`;
}

/* ── ADMIN ── */
function adminLogin() {
  const pass = document.getElementById('admin-pass').value;

  if (pass === ADMIN_PASSWORD) {
    document.getElementById('admin-err').style.display = 'none';
    renderDash();
    showView('view-admin-dash');
  } else {
    document.getElementById('admin-err').style.display = 'block';
  }
}

function adminLogout() {
  document.getElementById('admin-pass').value = '';
  showView('view-signup');
}

/* ── DASHBOARD ── */
async function renderDash() {

  const signups = await getSignups();

  const paid = signups.filter(s => s.paid).length;

  document.getElementById('stat-signed').textContent = signups.length;
  document.getElementById('stat-paid').textContent = paid;
  document.getElementById('stat-remaining').textContent =
    MAX_SEATS - signups.length;

  const tbody = document.getElementById('roster-body');

  if (!signups.length) {
    tbody.innerHTML = '';
    return;
  }

  tbody.innerHTML = signups.map(s => `
    <tr>
      <td>${s.seat_number}</td>
      <td>${s.name}</td>
      <td>${s.phone}</td>
      <td>${s.email}</td>
      <td>${s.instagram}</td>
      <td>
        <button class="paid-btn ${s.paid ? 'paid' : 'unpaid'}"
          onclick="togglePaid(${s.id}, ${s.paid})">
          ${s.paid ? '✓ Paid' : 'Unpaid'}
        </button>
      </td>
    </tr>
  `).join('');
}

/* ── TOGGLE PAID ── */
async function togglePaid(id, currentPaid) {

  const { error } = await supabase
    .from('signups')
    .update({ paid: !currentPaid })
    .eq('id', id);

  if (error) {
    console.error(error);
    return;
  }

  renderDash();
}

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded', async () => {
  initCashApp();
  await updateSeatsDisplay();
});
</script>

</body>
</html>
